<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AropytEditor icon</title>
  <desc id="desc">A minimal app icon built around a refined capital A mark.</desc>
  <defs>
    <linearGradient id="background" x1="160" y1="120" x2="864" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.62" stop-color="#0E6068"/>
      <stop offset="1" stop-color="#D99A45"/>
    </linearGradient>
    <linearGradient id="aMark" x1="326" y1="292" x2="704" y2="746" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#E9FEFA"/>
      <stop offset="1" stop-color="#F2B762"/>
    </linearGradient>
    <linearGradient id="crossbar" x1="420" y1="580" x2="612" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F3D5"/>
    </linearGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#03101B" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#background)"/>

  <g filter="url(#markShadow)">
    <path d="M330 724L504 304c5-13 18-22 32-22s27 9 32 22l174 420" fill="none" stroke="url(#aMark)" stroke-width="82" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M426 580h196" fill="none" stroke="url(#crossbar)" stroke-width="62" stroke-linecap="round"/>
  </g>
</svg>
